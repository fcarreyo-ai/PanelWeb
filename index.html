<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gestión Administrativa</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background-color: var(--tg-theme-bg-color, #181818); 
      color: var(--tg-theme-text-color, #f5f5f5);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 95vh;
      box-sizing: border-box;
    }

    .card {
      background-color: var(--tg-theme-secondary-bg-color, #242424);
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      box-sizing: border-box;
      position: relative;
    }

    /* PANTALLAS (Por defecto ocultas, se controlan por JS) */
    .view {
      display: none;
    }
    .view.active {
      display: block;
    }

    /* CABECERAS */
    h2 {
      color: var(--tg-theme-button-color, #5288c1);
      margin-top: 0;
      margin-bottom: 4px;
      font-size: 22px;
      text-align: center;
    }

    .subtitle {
      color: var(--tg-theme-hint-color, #aaaaaa);
      font-size: 13px;
      text-align: center;
      margin-bottom: 24px;
    }

    .user-tag {
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 11px;
      color: var(--tg-theme-hint-color, #aaaaaa);
      font-weight: 500;
    }

    /* COMPONENTES DEL FORMULARIO */
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    select, input[type="number"], input[type="date"], textarea {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid var(--tg-theme-hint-color, #444444);
      background-color: var(--tg-theme-bg-color, #181818);
      color: var(--tg-theme-text-color, #f5f5f5);
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    select:focus, input:focus, textarea:focus {
      border-color: var(--tg-theme-button-color, #5288c1);
    }

    textarea {
      resize: none;
      height: 70px;
    }

    /* BOTONES */
    .btn-main {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 12px 0;
      background-color: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-sizing: border-box;
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--tg-theme-hint-color, #aaaaaa);
      border: 1px solid var(--tg-theme-hint-color, #444444);
    }

    .btn-main:active, .btn-secondary:active {
      opacity: 0.8;
    }

    /* CONSOLA DE DIAGNÓSTICO */
    #consola {
      width: 100%;
      max-width: 420px;
      margin-top: 16px;
      padding: 12px;
      background-color: #050505;
      color: #00ff00;
      font-family: monospace;
      font-size: 11px;
      border-radius: 8px;
      box-sizing: border-box;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="card">
    
    <div id="viewMenu" class="view active">
      <h2 id="saludoMenu">¡Hola!</h2>
      <div class="subtitle">MiniApp de Gestión Administrativa</div>
      
      <button class="btn-main" id="btnIrFaltas">📝 Registrar Falta</button>
    </div>


    <div id="viewFormFaltas" class="view">
      <div class="user-tag" id="userTagForm">Usuario: ---</div>
      <h2>Registrar Falta</h2>
      <div class="subtitle">Registro de ausences laborales del personal</div>
      
      <div class="form-group">
        <label for="selectNombre">👤 Nombre de la Persona:</label>
        <select id="selectNombre">
          <option value="">Cargando personal...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="selectCausa">📌 Causa / Tipo de Falta:</label>
        <select id="selectCausa">
          <option value="">Cargando causas...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="inputDuracion">⏳ Duración (Días):</label>
        <input type="number" id="inputDuracion" min="1" value="1">
      </div>

      <div class="form-group">
        <label for="inputFecha">📅 Fecha de Inicio:</label>
        <input type="date" id="inputFecha">
      </div>

      <div class="form-group">
        <label for="txtObservaciones">💬 Observaciones:</label>
        <textarea id="txtObservaciones" placeholder="Detalles adicionales o justificación..."></textarea>
      </div>
      
      <button class="btn-main" id="btnAceptarFalta">🚀 Aceptar y Procesar</button>
      <button class="btn-main btn-secondary" id="btnVolverMenu">⬅️ Volver al Menú</button>
    </div>

  </div>

  <div id="consola">Iniciando sistema de navegación...</div>

  <script>
    // URL real de tu WebApp de Google Apps Script (Sigue siendo la misma de ayer)
    const URL_BACKEND = "https://script.google.com/macros/s/1gD_Jhu2wFTxI2_JaKxoMc7qN7mHr7rwAeLr-VlNFCyA/exec";

    try {
      const tg = window.Telegram.WebApp;
      tg.expand(); 
      tg.ready();

      // Capturar parámetros de la URL
      const urlParams = new URLSearchParams(window.location.search);
      const chatIdAsignado = urlParams.get('chatId') || "";
      const nombreAsignado = urlParams.get('nombre') || "Usuario";
      
      // Inicializar textos de identidad
      document.getElementById('saludoMenu').innerText = "¡Hola, " + nombreAsignado + "!";
      document.getElementById('userTagForm').innerText = "Usuario: " + nombreAsignado;
      
      // Colocar fecha de hoy por defecto
      document.getElementById('inputFecha').value = new Date().toISOString().split('T')[0];

      // ==========================================
      // CONTROL DE NAVEGACIÓN (CAMBIO DE PANTALLAS)
      // ==========================================
      function cambiarPantalla(pantallaId, mensajeConsola) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(pantallaId).classList.add('active');
        document.getElementById('consola').innerText = "Diagnóstico: " + mensajeConsola;
      }

      // Eventos de los botones de navegación
      document.getElementById('btnIrFaltas').addEventListener('click', () => {
        cambiarPantalla('viewFormFaltas', "Módulo 'Registrar Falta' abierto.");
      });

      document.getElementById('btnVolverMenu').addEventListener('click', () => {
        cambiarPantalla('viewMenu', "Menú Principal activo.");
      });

      // ==========================================
      // CONSULTA DE COMBOS A GOOGLE SHEETS
      // ==========================================
      function cargarCombosDesdeGoogle() {
        document.getElementById('consola').innerText = "Consultando listas al Sheets a través de mydoGet...";
        
        fetch(`${URL_BACKEND}?obtener=combos`)
          .then(response => response.json())
          .then(data => {
            if (data.estatus === "OK") {
              // Poblar Personal
              const selectNombre = document.getElementById('selectNombre');
              selectNombre.innerHTML = '<option value="">-- Seleccione Personal --</option>';
              data.personal.forEach(p => {
                let opt = document.createElement('option');
                opt.value = p; opt.textContent = p;
                selectNombre.appendChild(opt);
              });

              // Poblar Causas
              const selectCausa = document.getElementById('selectCausa');
              selectCausa.innerHTML = '<option value="">-- Seleccione la Causa --</option>';
              data.causas.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                selectCausa.appendChild(opt);
              });

              document.getElementById('consola').innerText = "Diagnóstico: Menú Principal cargado. Listas en caché listas para usarse.";
            } else {
              document.getElementById('consola').innerText = "Error: " + data.detalle;
            }
          })
          .catch(err => {
            document.getElementById('consola').innerText = "Error de enlace HTTP: " + err.message;
          });
      }

      // Cargar los combos en segundo plano apenas abra la MiniApp
      cargarCombosDesdeGoogle();

      // ==========================================
      // ENVÍO DE DATOS DEL FORMULARIO
      // ==========================================
      document.getElementById('btnAceptarFalta').addEventListener('click', function() {
        const nombreSel = document.getElementById('selectNombre').value;
        const causaSel = document.getElementById('selectCausa').value;
        const duracionSel = document.getElementById('inputDuracion').value;
        const fechaSel = document.getElementById('inputFecha').value;
        const obsSel = document.getElementById('txtObservaciones').value;

        if (!nombreSel || !causaSel || !duracionSel || !fechaSel) {
          alert("Por favor, rellene todos los campos obligatorios.");
          return;
        }

        try {
          const paqueteFalta = {
            accion: "registrar_falta_solicitud",
            chatId: chatIdAsignado,
            operador: nombreAsignado,
            datos: {
              nombre: nombreSel,
              causa: causaSel,
              duracion: parseInt(duracionSel, 10),
              fechaInicio: fechaSel,
              observaciones: obsSel
            }
          };
          
          tg.sendData(JSON.stringify(paqueteFalta));
        } catch (errBoton) {
          document.getElementById('consola').innerText = "Error de envío: " + errBoton.message;
        }
      });

    } catch (errGeneral) {
      alert("Error crítico: " + errGeneral.message);
    }
  </script>
</body>
</html>
